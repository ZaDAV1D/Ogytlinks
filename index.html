<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OGYT Links</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-dark:#0a0515;
  --accent:#00ffcc; /* green */
  --accent-2:#66ffdd; /* green light */
  --accent-3:#00ff88; /* vibrant green */
  --accent-4:#ff00ff; /* magenta */
  --accent-5:#00ccff; /* cyan */
  --glass: rgba(255,255,255,0.04);
  --glass-strong: rgba(255,255,255,0.08);
  --particle: 0,255,200; /* rgb for JS particles */
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html {
  min-height: 100%;
}

body {
  margin:0;
  font-family: 'Rubik', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
  background: radial-gradient(1400px 700px at 15% 15%, rgba(0,255,200,0.08), transparent 9%), radial-gradient(900px 500px at 90% 85%, rgba(0,170,255,0.06), transparent 12%), radial-gradient(1100px 600px at 50% 50%, rgba(255,0,255,0.03), transparent 15%), var(--bg-dark);
  overflow:hidden;
  display:grid;
  place-items:center;
  min-height:100vh;
  min-height:100svh;
  min-height:100dvh;
  padding:24px 16px;
  color:white;
  text-align:center;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* enhanced animated background blobs with gentle parallax */
:root{ --mx:0px; --my:0px; }
body::before,
body::after{
  content:'';
  position:fixed;
  left:50%; top:50%;
  width:90vmax; height:90vmax;
  transform:translate(calc(-50% + var(--mx)), calc(-50% + var(--my))) scale(1.05);
  filter: blur(100px) saturate(130%);
  z-index:-2;
  pointer-events:none;
  opacity:0.95;
}
body::before{
  background: radial-gradient(circle at 30% 35%, rgba(0,255,200,0.22), transparent 22%), radial-gradient(circle at 8% 80%, rgba(0,200,170,0.12), transparent 32%), radial-gradient(circle at 15% 15%, rgba(0,255,136,0.1), transparent 25%);
  animation: blobDrift 22s ease-in-out infinite;
}
body::after{
  background: radial-gradient(circle at 70% 60%, rgba(0,200,170,0.10), transparent 18%), radial-gradient(circle at 88% 18%, rgba(0,255,200,0.06), transparent 28%);
  animation: blobDriftAlt 26s ease-in-out infinite;
  mix-blend-mode: screen;
}

/* subtle noise overlay to add texture */
.bg-noise{
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.8' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='1' fill='white'/></svg>");
  background-repeat: repeat;
  opacity:0.03;
}

@keyframes blobDrift{ 0%{ transform:translate(calc(-50% + var(--mx)), calc(-50% + var(--my))) scale(1); } 50%{ transform:translate(calc(-51% + calc(var(--mx) * 0.6)), calc(-52% + calc(var(--my) * 0.6))) scale(1.06);} 100%{ transform:translate(calc(-50% + var(--mx)), calc(-50% + var(--my))) scale(1); } }
@keyframes blobDriftAlt{ 0%{ transform:translate(calc(-50% + var(--mx)), calc(-50% + var(--my))) scale(1); } 50%{ transform:translate(calc(-49% + calc(var(--mx) * 0.4)), calc(-48% + calc(var(--my) * 0.4))) scale(1.04);} 100%{ transform:translate(calc(-50% + var(--mx)), calc(-50% + var(--my))) scale(1); } }

@media (prefers-reduced-motion: reduce){
  body::before, body::after{ animation:none !important; }
}

/* אור אחרי העכבר */
.cursor-light{
  position:fixed;
  width:90px; height:90px;
  background: radial-gradient(circle at 35% 35%, rgba(0,255,200,0.2), rgba(0,170,255,0.08) 50%, transparent 70%);
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:999;
  mix-blend-mode: screen;
  transition: transform 0.08s ease, opacity 0.18s ease;
  filter: blur(8px);
  opacity:0.95;
  will-change: transform, opacity;
  box-shadow: 0 0 40px rgba(0,255,200,0.2);
}

/* פטיש */
#hammer{
  font-size:80px;
  color:var(--accent);
  text-shadow:0 0 20px var(--accent), 0 0 45px var(--accent-2), 0 0 80px rgba(0,255,200,0.7), 0 0 120px rgba(0,255,136,0.4);
  position:absolute;
  opacity:0;
  transform:translate(-50%,-50%) rotate(-45deg);
  z-index:10;
  transition: all 0.15s ease;
  filter: drop-shadow(0 0 15px rgba(0,255,200,0.5));
}

/* קונטיינר מרכזי */
.container-frame{
  --frame-scale:0.88;
  position:fixed;
  top:50%;
  left:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:32px;
  padding:42px 34px;
  max-width:480px;
  width:min(100%, 480px);
  border-radius:32px;
  background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
  backdrop-filter: blur(20px) saturate(130%);
  border: 1.5px solid rgba(0,255,200,0.15);
  box-shadow: 0 24px 80px rgba(0,20,30,0.8), 0 0 80px rgba(0,255,200,0.1) inset, inset -1px -1px 0 0 rgba(255,255,255,0.05);
  opacity:0;
  transform: translate(-50%, calc(-50% + 20px)) scale(calc(var(--frame-scale) * 0.92));
  transform-origin:center;
  z-index:10;
  transition: all 0.6s ease;
  will-change: transform, opacity;
}

/* container open state for entrance animation */
.container-frame.open{
  opacity:1;
  transform: translate(-50%, -50%) scale(var(--frame-scale));
  transition: transform 700ms cubic-bezier(.2,.9,.2,1), opacity 520ms ease;
  filter: none;
}

/* פרופיל */
.profile img{
  width:140px; height:140px;
  border-radius:50%;
  border:6px solid rgba(0,255,200,0.95);
  object-fit:cover;
  margin-bottom:20px;
  box-shadow:0 0 0 2px rgba(0,255,200,0.4), 0 16px 60px rgba(5,5,10,0.8), 0 0 50px rgba(0,255,200,0.18), inset 0 0 30px rgba(0,255,200,0.08);
  transform-origin:center;
  animation:floatImg 6s ease-in-out infinite;
  position:relative;
}

@keyframes floatImg{
  0%{ transform:translateY(0) }
  50%{ transform:translateY(-6px) }
  100%{ transform:translateY(0) }
}

h1{
  margin:8px 0;
  font-size:46px;
  font-weight:700;
  background: linear-gradient(135deg, var(--accent), var(--accent-2), var(--accent-3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing:-0.5px;
  text-shadow: 0 0 60px rgba(0,255,200,0.4);
  filter: drop-shadow(0 0 20px rgba(0,255,200,0.2));
}

.subtitle{
  font-size:18px;
  color: rgba(229,229,255,0.9);
  margin-bottom:20px;
  line-height:1.35;
}

/* כפתורים */
.links{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
  width:100%;
}

.link-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  width:100%;
  max-width:420px;
  padding:18px 28px;
  background: linear-gradient(135deg, rgba(0,255,200,0.16) 0%, rgba(0,170,255,0.12) 50%, rgba(102,255,221,0.08) 100%);
  color:var(--accent-2);
  font-size:21px;
  font-weight:700;
  text-decoration:none;
  border-radius:32px;
  border:1.5px solid rgba(0,255,200,0.25);
  box-shadow: 0 16px 50px rgba(0,20,30,0.7), 0 8px 25px rgba(0,0,0,0.4) inset, 0 0 40px rgba(0,255,200,0.08) inset;
  position:relative;
  overflow:hidden;
  opacity:0;
  transform: translateY(30px) scale(0.96);
  transition: transform 0.28s cubic-bezier(.2,.9,.2,1), box-shadow 0.28s ease, opacity 0.45s ease, background 0.4s ease, border-color 0.28s ease;
  will-change: transform, box-shadow, opacity;
  backdrop-filter: blur(10px);
  line-height:1.25;
  min-width:0;
  white-space:normal;
  text-wrap:balance;
}

/* revealed state for buttons (added by JS) */
.link-btn.revealed{
  opacity:1;
  transform: translateY(0) scale(1);
  animation: btnPop 500ms cubic-bezier(.2,.9,.2,1);
}

@keyframes btnPop{
  0%{ transform: translateY(20px) scale(0.92); opacity:0; }
  60%{ transform: translateY(-8px) scale(1.06); opacity:1; }
  100%{ transform: translateY(0) scale(1); }
}

.link-btn i{
  font-size:1.6em;
  transition: transform 0.32s cubic-bezier(.2,.9,.2,1), filter 0.28s ease;
  filter: drop-shadow(0 0 6px rgba(0,255,200,0.3));
  flex:0 0 auto;
}

.link-btn:hover{
  transform: translateY(-10px) scale(1.06);
  box-shadow: 0 32px 120px rgba(0,255,200,0.22), 0 12px 40px rgba(0,0,0,0.8), 0 0 60px rgba(0,255,200,0.15) inset;
  background: linear-gradient(135deg, rgba(0,255,200,0.24) 0%, rgba(0,170,255,0.2) 50%, rgba(102,255,221,0.14) 100%);
  border-color: rgba(0,255,200,0.4);
}

.link-btn:hover i{ 
  transform: translateX(-8px) scale(1.15) rotate(-8deg); 
  filter: drop-shadow(0 0 12px rgba(0,255,200,0.6));
}

/* subtle pulse on hover to give more life */
.link-btn:hover::before{
  content:''; position:absolute; inset:0; border-radius:inherit; box-shadow:0 0 60px rgba(0,255,200,0.12) inset, 0 0 30px rgba(0,255,200,0.08); pointer-events:none; opacity:1;
}

/* stronger shine when focused/active */
.link-btn:active, .link-btn.touch-active{ transform: translateY(-2px) scale(1.02); }


.link-btn:focus{
  outline:3px solid rgba(0,255,200,0.12);
  outline-offset:4px;
}

.link-btn::after{
  content:'';
  position:absolute;
  left: -40%; top:0;
  width:40%; height:100%;
  background: linear-gradient(120deg, rgba(255,255,255,0.25), rgba(255,255,255,0.05));
  transform: skewX(-18deg) translateX(0);
  transition: transform 0.6s cubic-bezier(.2,.9,.2,1);
  pointer-events:none;
  opacity:0.7;
}
.link-btn:hover::after{ transform: translateX(220%); opacity:1 }

/* ripple effect for touch interactions */
.link-btn .ripple{
  position:absolute;
  width:20px; height:20px;
  background: rgba(0,255,200,0.3);
  border-radius:50%;
  transform:translate(-50%,-50%) scale(0);
  pointer-events:none;
  box-shadow:0 8px 30px rgba(0,255,200,0.4), 0 0 30px rgba(0,255,200,0.15);
  animation:rippleAnim 600ms cubic-bezier(.2,.9,.2,1) forwards;
}
@keyframes rippleAnim{ to{ transform:translate(-50%,-50%) scale(14); opacity:0; } }

/* קרדיט */
.credit{
  margin-top:6px;
  font-size:16px;
  color:rgba(0,255,200,0.6);
  text-align:center;
  letter-spacing:0.5px;
  font-weight:500;
  transition: all 0.3s ease;
}

.credit:hover{
  color:rgba(0,255,200,0.9);
  text-shadow: 0 0 20px rgba(0,255,200,0.5);
}

/* canvas רקע רשת */
canvas#network-bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}

/* ניצוצות */
.spark{
  position:absolute;
  width:10px; height:10px;
  background:rgba(0,255,200,0.95);
  border-radius:50%;
  pointer-events:none;
  opacity:0;
  z-index:100;
  box-shadow:0 0 16px rgba(0,255,200,1), 0 0 32px rgba(0,255,136,0.6);
  animation:sparkAnim 0.95s ease-out forwards;
}

@keyframes sparkAnim{
  0%{transform:scale(0); opacity:1;}
  100%{transform:translate(var(--x),var(--y)) scale(1); opacity:0;}
}

/* התאמות מובייל בלבד */
@media (max-width:600px){
  body{
    overflow-x:hidden;
    overflow-y:hidden;
    padding:10px;
  }

  .container-frame{
    --frame-scale:min(0.82, calc((100dvh - 20px) / 650));
    max-width:360px;
    padding:24px 18px;
    gap:14px;
  }
  .profile img{
    width:110px;
    height:110px;
    margin-bottom:12px;
    border-width:5px;
  }
  h1{
    font-size:32px;
  }
  .subtitle{
    font-size:17px;
    margin-bottom:8px;
  }
  .link-btn{
    font-size:19px;
    padding:18px 22px;
    max-width:100%;
    width:100%;
    gap:13px;
    border-radius:24px;
    min-height:58px;
    justify-content:center;
    border-width:1.2px;
  }
  .credit{
    font-size:14px;
    margin-top:2px;
  }
}

@media (max-width:420px){
  .container-frame{ --frame-scale:min(0.78, calc((100dvh - 20px) / 600)); padding:14px 12px; border-radius:22px; gap:10px; }
  .profile img{ width:84px; height:84px; border-width:4px; margin-bottom:8px; }
  h1{ font-size:30px; margin:4px 0; }
  .subtitle{ font-size:15px; margin-bottom:4px; }
  .links{ gap:10px; }
  .link-btn{ font-size:15px; padding:12px 10px; min-height:48px; border-radius:18px; gap:9px; }
  .credit{ font-size:13px; margin-top:0; }
  #hammer{ font-size:60px; top:10px; }
  .cursor-light{ display:none; }
  canvas#network-bg{ opacity:0.85; }
}

/* reduce visual intensity on mobile */
@media (max-width:800px){
  body::before, body::after{ filter: blur(80px) saturate(110%); }
  .container-frame{ box-shadow: 0 8px 26px rgba(0,0,0,0.55); }
  .link-btn{ box-shadow: 0 8px 20px rgba(0,0,0,0.45) inset; }
}

/* שיפורי נגישות ומגע - גדלי טאפ טובים יותר למובייל */
@media (min-width:421px) and (max-width:700px){
  .container-frame{ --frame-scale:0.82; width:95%; padding:18px; }
  .links{ gap:14px; }
  .link-btn{ max-width:100%; padding:16px 20px; font-size:18px; border-radius:14px; }
}

@media (max-height:640px){
  .container-frame{ --frame-scale:0.74; }
}

@media (max-height:560px){
  .container-frame{ --frame-scale:0.66; }
}

/* הסתרת אפקט העכבר במכשירי מגע */
@media (hover: none) and (pointer: coarse){
  .cursor-light{ display:none; }
}

/* אפקט מגע שמחקה hover/shine */
.link-btn.active{ 
  transform: translateY(-8px) scale(1.04); 
  box-shadow:0 24px 100px rgba(0,255,200,0.2), 0 8px 35px rgba(0,0,0,0.7), 0 0 50px rgba(0,255,200,0.12) inset;
}
.link-btn.touch-active::after{ transform: translateX(220%); opacity:1; transition: transform 0.32s ease; }

/* למשתמשים שמעדיפים תנועה מופחתת */
@media (prefers-reduced-motion: reduce){
  *{ transition: none !important; animation: none !important; }
}
</style>
</head>
<body>

<canvas id="network-bg"></canvas>
<div class="bg-noise" aria-hidden="true"></div>
<div class="cursor-light" id="cursorLight"></div>
<i id="hammer" class="fa-solid fa-hammer"></i>

<div class="container-frame" id="containerFrame">
  <div class="profile">
    <img src="https://image2url.com/r2/default/images/1775305525281-c8ce95d5-a495-449b-bb12-6cae3690be54.jpg" alt="Profile">
    <h1>OGYT</h1>
    <div class="subtitle">קישורים של OGYT</div>
  </div>

  <div class="links">
    <a class="link-btn" href="https://www.youtube.com/@orgala15" target="_blank" rel="noopener noreferrer"><i class="fab fa-youtube"></i> יוטיוב</a>
    <a class="link-btn" href="https://www.youtube.com/@orgala15?sub_confirmation=1" target="_blank" rel="noopener noreferrer"><i class="fab fa-youtube"></i> לעשות סאב</a>
    <a class="link-btn" href="https://streamelements.com/orgala14/tip" target="_blank" rel="noopener noreferrer"><i class="fas fa-coins"></i> תרומות (באישור הורים או 18+)</a>
    <a class="link-btn" href="https://discord.gg/FhgfDndG" target="_blank" rel="noopener noreferrer"><i class="fab fa-discord"></i> דיסקורד</a>
    <a class="link-btn" href="https://www.tiktok.com/@orgala1781" target="_blank" rel="noopener noreferrer"><i class="fab fa-tiktok"></i> טיקטוק</a>
  </div>

  <div class="credit">crate by ZaDAV1D</div>
</div>

<script>
// אור אחרי העכבר
const cursor=document.getElementById("cursorLight");
document.addEventListener("mousemove", e=>{
  cursor.style.left=e.clientX+'px';
  cursor.style.top=e.clientY+'px';
  cursor.style.transform='translate(-50%,-50%) scale(1.2)';
  setTimeout(()=>cursor.style.transform='translate(-50%,-50%) scale(1)',100);
});

// פטיש
const hammer=document.getElementById('hammer');
const container=document.getElementById('containerFrame');
const buttons=document.querySelectorAll('.link-btn');

function createSpark(x,y,amount=1){
  for(let i=0;i<amount;i++){
    const spark=document.createElement('div');
    spark.className='spark';
    spark.style.left=x+'px';
    spark.style.top=y+'px';
    spark.style.setProperty('--x',(Math.random()-0.5)*150+'px');
    spark.style.setProperty('--y',(Math.random()-0.5)*150+'px');
    document.body.appendChild(spark);
    setTimeout(()=>spark.remove(),800);
  }
}

async function hammerBuild(){
  // position hammer above the container center
  hammer.style.opacity = 1;
  const rect = container.getBoundingClientRect();
  hammer.style.left = rect.left + rect.width/2 + 'px';
  hammer.style.top = rect.top - 50 + 'px';

  // quick build-in swings
  for(let i=0;i<2;i++){
    hammer.style.transform='translate(-50%,-50%) rotate(-20deg) scale(1.06)';
    await new Promise(r=>setTimeout(r,140));
    hammer.style.transform='translate(-50%,-50%) rotate(8deg) scale(1)';
    await new Promise(r=>setTimeout(r,140));
  }

  // reveal container gracefully
  container.classList.add('open');

  // staggered reveal for buttons with nicer timing
  for(let i=0;i<buttons.length;i++){
    const btn = buttons[i];
    const br = btn.getBoundingClientRect();
    // hammer hits above button
    hammer.style.left = br.left + br.width/2 + 'px';
    hammer.style.top = br.top - 40 + 'px';
    hammer.style.transform='translate(-50%,-50%) rotate(-20deg) scale(1.06)';
    await new Promise(r=>setTimeout(r,120));
    hammer.style.transform='translate(-50%,-50%) rotate(8deg) scale(1)';
    await new Promise(r=>setTimeout(r,120));

    // reveal button with pop
    btn.classList.add('revealed');
    createSpark(br.left+br.width/2, br.top+br.height/2,10);
  }

  // fade hammer out
  hammer.style.opacity = 0;
}

window.addEventListener('load', hammerBuild);
// prepare buttons for animation state
for(const b of buttons){ b.setAttribute('aria-hidden','true'); b.style.pointerEvents='none'; }

// when button revealed remove aria-hidden & enable pointer events
const observer = new MutationObserver((muts)=>{
  muts.forEach(m=>{
    if(m.type==='attributes' && m.target.classList && m.target.classList.contains('revealed')){
      m.target.removeAttribute('aria-hidden');
      m.target.style.pointerEvents='auto';
    }
  });
});
buttons.forEach(b=>observer.observe(b,{attributes:true}));

// parallax for background blobs: update CSS variables based on mouse
if (typeof window !== 'undefined' && window.document){
  const root = document.documentElement;
  let lastX=0, lastY=0;
  document.addEventListener('mousemove', (e)=>{
    const mx = (e.clientX - window.innerWidth/2) * 0.02;
    const my = (e.clientY - window.innerHeight/2) * 0.02;
    lastX = mx; lastY = my;
    root.style.setProperty('--mx', mx+'px');
    root.style.setProperty('--my', my+'px');
  }, {passive:true});

  // fallback for devices with gyroscope
  if(window.DeviceOrientationEvent){
    window.addEventListener('deviceorientation', (ev)=>{
      const gx = ev.gamma || 0; const gy = ev.beta || 0;
      const mx = gx * 1.2; const my = gy * 0.9;
      root.style.setProperty('--mx', mx+'px');
      root.style.setProperty('--my', my+'px');
    }, {passive:true});
  }
}

// canvas רשת חלקיקים
const canvas=document.getElementById('network-bg');
const ctx=canvas.getContext('2d');
function resizeCanvas(){
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.round(window.innerWidth * dpr);
  canvas.height = Math.round(window.innerHeight * dpr);
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resizeCanvas();
let particles=[];
// smoothed parallax targets for gentler motion
let smoothMx = 0, smoothMy = 0;
function initParticles(){
  particles.length=0;
  const area = window.innerWidth*window.innerHeight;
  let count = Math.floor(area/120000);
  if(count<30) count=30;
  if(count>120) count=120;
  const w = window.innerWidth;
  const h = window.innerHeight;
  for(let i=0;i<count;i++) particles.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-0.5)*1.1,vy:(Math.random()-0.5)*1.1});
}
initParticles();
function drawNetwork(){
  // clear
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // compute subtle animated offset for the grid (time + parallax from CSS vars)
  const reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cs = getComputedStyle(document.documentElement);
  const targetMx = parseFloat(cs.getPropertyValue('--mx') || '0') || 0;
  const targetMy = parseFloat(cs.getPropertyValue('--my') || '0') || 0;
  // smooth the pointer/gyro values for more fluid motion
  smoothMx += (targetMx - smoothMx) * 0.12;
  smoothMy += (targetMy - smoothMy) * 0.12;
  const t = performance.now() / 1000;
  // faster, smooth drift
  const driftX = Math.sin(t * 0.9) * 36 + smoothMx * 1.1;
  const driftY = Math.cos(t * 0.75) * 30 + smoothMy * 1.1;

  // draw subtle background grid lines for depth (lighter on small screens / reduced motion)
  if(!reduced){
    ctx.save();
    ctx.fillStyle = 'rgba(0,255,200,0.04)';
    const gap = Math.max(28, Math.floor(Math.min(window.innerWidth, window.innerHeight) / 22));
    const sq = Math.max(6, Math.floor(gap * 0.28));
    // start positions offset by drifting values for motion (use viewport coords)
    const startX = Math.round((driftX % gap + gap) % gap) - gap;
    const startY = Math.round((driftY % gap + gap) % gap) - gap;
    for(let x = startX; x < window.innerWidth + gap; x += gap){
      for(let y = startY; y < window.innerHeight + gap; y += gap){
        // draw a soft square (centered within cell)
        ctx.globalAlpha = 1.0;
        ctx.fillRect(x + (gap - sq) / 2, y + (gap - sq) / 2, sq, sq);
      }
    }
    ctx.globalAlpha = 1.0;
    ctx.restore();
  }

  // particles and connecting lines
    for(let i=0, len = particles.length;i<len;i++){
    let p=particles[i];
    ctx.fillStyle='rgba(var(--particle),0.85)';
    ctx.beginPath(); ctx.arc(p.x,p.y,1.6,0,Math.PI*2); ctx.fill();
    for(let j=i+1;j<particles.length;j++){
      let q=particles[j];
      let dx=p.x-q.x, dy=p.y-q.y;
      let dist=Math.sqrt(dx*dx+dy*dy);
      // increased threshold for more lines, with smoother alpha falloff
      const maxDist = 160;
      if(dist < maxDist){
        const alpha = Math.max(0, 0.55 * (1 - dist / maxDist));
        ctx.strokeStyle = 'rgba(var(--particle),'+alpha+')';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y); ctx.stroke();
      }
    }
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0||p.x>window.innerWidth)p.vx*=-1;
    if(p.y<0||p.y>window.innerHeight)p.vy*=-1;
  }

  requestAnimationFrame(drawNetwork);
}
drawNetwork();
window.addEventListener('resize',()=>{ resizeCanvas(); initParticles(); } );

// מניעת F12 / Ctrl+Shift+I / Tab / העתקה
document.addEventListener('keydown', function(e) {
    if(e.key === "F12") e.preventDefault();
    if(e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J")) e.preventDefault();
    if(e.ctrlKey && e.key === "U") e.preventDefault();
    if(e.ctrlKey && (e.key === "c" || e.key === "x" || e.key === "v")) e.preventDefault();
    if(e.key === "Tab") e.preventDefault();
});
document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
document.addEventListener('dragstart', function(e){ e.preventDefault(); });
document.addEventListener('selectstart', function(e){ e.preventDefault(); });

// שיפורי מגע ונגישות לכפתורים
const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
buttons.forEach(btn=>{
  // keyboard accessibility: add focus style
  btn.addEventListener('focus', ()=>btn.classList.add('active'));
  btn.addEventListener('blur', ()=>btn.classList.remove('active'));

  // pointer enter/leave for devices that support hover
  btn.addEventListener('pointerenter', ()=>{ if(!btn.classList.contains('touching')) btn.classList.add('active'); });
  btn.addEventListener('pointerleave', ()=>{ btn.classList.remove('active'); btn.classList.remove('touch-active'); });

  // touch handlers to mimic hover + ripple
  btn.addEventListener('touchstart', (ev)=>{
    btn.classList.add('touching','active','touch-active');
    // create ripple
    const t = ev.touches[0];
    const rect = btn.getBoundingClientRect();
    const rx = t.clientX - rect.left;
    const ry = t.clientY - rect.top;
    const rip = document.createElement('div'); rip.className='ripple';
    rip.style.left=rx+'px'; rip.style.top=ry+'px';
    btn.appendChild(rip);
    setTimeout(()=>{ rip.remove(); }, 700);
  }, {passive:true});

  btn.addEventListener('touchend', ()=>{ btn.classList.remove('touching'); if(!prefersReduced) setTimeout(()=>btn.classList.remove('active','touch-active'),150); else { btn.classList.remove('active','touch-active'); } });
  btn.addEventListener('touchcancel', ()=>{ btn.classList.remove('touching','active','touch-active'); });
});
</script>
