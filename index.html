<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OGYT Links</title>
<meta name="theme-color" content="#000000">
<!-- Preconnect for Google Fonts -->
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet">
<!-- Simple SVG favicon -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%2300ffcc'/%3E%3Ctext x='50' y='58' font-size='48' text-anchor='middle' fill='%23000'>O%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#0a0a0a;
  --accent-1: #00ffcc;
  --accent-2: #00aaff;
  --glass-bg: rgba(255,255,255,0.03);
}

/* subtle backdrop glow behind container */
body::before{
  content:'';
  position:fixed; inset:0; z-index:0;
  background: radial-gradient(600px 400px at 50% 30%, rgba(0,255,200,0.06), transparent 30%), radial-gradient(400px 300px at 20% 70%, rgba(0,170,255,0.03), transparent 20%);
  pointer-events:none; filter:blur(20px);
}

body {
  margin:0;
  font-family: 'Rubik', sans-serif;
  background:var(--bg);
  overflow:auto;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:white;
  text-align:center;
}

/* אור אחרי העכבר */
.cursor-light{
  position:fixed;
  width:50px; height:50px;
  background:rgba(0,255,200,0.4);
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:999;
  mix-blend-mode: screen;
  transition: transform 0.1s ease;
}

/* פטיש */
#hammer{
  font-size:70px;
  color:var(--accent-1);
  text-shadow:0 0 15px var(--accent-1),0 0 35px #00ffee,0 0 60px #a0ffcc;
  position:fixed; /* use viewport coordinates so it's stable on scroll */
  pointer-events:none; /* don't block pointer interactions */
  opacity:0;
  transform:translate(-50%,-50%) rotate(-45deg);
  z-index:995;
  transition: all 0.18s ease;
}

/* קונטיינר מרכזי */
.container-frame{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:30px;
  padding:40px 30px;
  max-width:450px;
  width:90%;
  border-radius:25px;
  background: rgba(0,255,200,0.06);
  box-shadow:0 0 60px rgba(0,255,200,0.45);
  opacity:0;
  transform:scale(0.8);
  z-index:10;
  transition: all 0.9s ease;
}

/* פרופיל */
.profile img{
  width:150px; height:150px;
  border-radius:50%;
  border:5px solid rgba(0,255,200,0.9);
  object-fit:cover;
  margin-bottom:15px;
  box-shadow:0 0 30px rgba(0,255,200,0.8);
}

h1{
  margin:6px 0;
  font-size:48px;
  color:#00ffcc;
}

.subtitle{
  font-size:20px;
  color:#66ffdd;
  margin-bottom:20px;
}

/* כפתורים */
.links{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
  width:100%;
  perspective:1000px; /* enable 3D perspective for children */
}

.link-btn{
  --rx: 0deg; --ry: 0deg; --scale: 1; /* used by JS tilt */
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  width:100%;
  max-width:400px;
  padding:20px 30px;
  background:linear-gradient(135deg,var(--accent-1) 0%,var(--accent-2) 100%);
  color:white;
  font-size:22px;
  font-weight:700;
  text-decoration:none;
  border-radius:35px;
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 12px 40px rgba(0,0,0,0.4);
  position:relative;
  overflow:hidden;
  opacity:0;
  transform: translateY(30px) rotateX(var(--rx)) rotateY(var(--ry)) scale(var(--scale));
  transition: transform 360ms cubic-bezier(.2,.8,.2,1), box-shadow 360ms ease, opacity 700ms ease;
  transform-style: preserve-3d;
  will-change: transform, box-shadow;
}

/* revealed state (set by JS without inline transform) */
.link-btn.revealed{ opacity:1; transform: translateY(0) scale(1); transition-delay: calc(var(--i,0) * 140ms); }

.link-btn i{
  font-size:1.5em;
}

.link-btn:hover{
  /* 3D tilt fallback: strong pre-defined tilt on hover */
  transform: perspective(800px) rotateX(8deg) rotateY(-10deg) scale(1.05);
  box-shadow:0 22px 60px rgba(0,255,200,0.45);
}

/* keyboard focus for accessibility */
.link-btn:focus-visible{
  outline: none;
  box-shadow: 0 0 0 4px rgba(0,255,200,0.12), 0 12px 40px rgba(0,0,0,0.5);
  transform: translateY(0) scale(1.03);
}

/* shine effect using pseudo-element */
.link-btn::before{
  content:'';
  position:absolute; left:-60%; top:-20%; width:40%; height:140%;
  background:linear-gradient(90deg, rgba(255,255,255,0.28), rgba(255,255,255,0.04));
  transform: translateX(-120%) skewX(-20deg);
  transition: transform 520ms cubic-bezier(.2,.8,.2,1);
  pointer-events:none; mix-blend-mode:overlay;
}
.link-btn:hover::before{ transform: translateX(220%) skewX(-20deg); }

/* Glass state: applied when intense 3D effect active or on hover */
.link-btn.glass,
.link-btn.revealed.glass,
.link-btn:hover.glass{
  background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
  border: 1px solid rgba(255,255,255,0.14);
  backdrop-filter: blur(8px) saturate(140%);
  -webkit-backdrop-filter: blur(8px) saturate(140%);
  box-shadow: 0 10px 30px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.02);
  color: rgba(230,255,250,0.98);
}

/* subtle inner highlight for glass */
.link-btn.glass::after{
  content:'';
  position:absolute; inset:0; border-radius:inherit;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), inset 0 -10px 40px rgba(0,255,200,0.02);
  pointer-events:none;
}

.link-btn.glass i{ color: var(--accent-2); filter: drop-shadow(0 6px 10px rgba(0,170,200,0.12)); }

/* קרדיט */
.credit{
  margin-top:20px;
  font-size:16px;
  color:rgba(255,255,255,0.7);
  text-align:center;
}

/* canvas רקע רשת */
canvas#network-bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}

/* ניצוצות */
.spark{
  position:absolute;
  width:8px; height:8px;
  background:rgba(0,255,200,0.9);
  border-radius:50%;
  pointer-events:none;
  opacity:0;
  z-index:100;
  box-shadow:0 0 12px rgba(0,255,200,1);
  animation:sparkAnim 0.8s ease-out forwards;
}

@keyframes sparkAnim{
  0%{transform:scale(0); opacity:1;}
  100%{transform:translate(var(--x),var(--y)) scale(1); opacity:0;}
}

/* Respect users who prefer reduced motion */
@media (prefers-reduced-motion: reduce){
  *{ transition:none !important; animation:none !important; }
}

/* התאמות מובייל בלבד */
@media (max-width:600px){
  .container-frame{
    max-width:320px;
    padding:20px 15px;
    gap:15px;
  }
  .profile img{
    width:100px;
    height:100px;
    margin-bottom:10px;
  }
  h1{
    font-size:28px;
  }
  .subtitle{
    font-size:16px;
    margin-bottom:12px;
  }
  .link-btn{
    font-size:16px;
    padding:12px 20px;
    max-width:260px;
    gap:10px;
  }
  .credit{
    font-size:14px;
  }
}
</style>
</head>
<body>

<canvas id="network-bg" aria-hidden="true"></canvas>
<div class="cursor-light" id="cursorLight"></div>
<i id="hammer" class="fa-solid fa-hammer"></i>

<div class="container-frame" id="containerFrame">
  <div class="profile">
    <img src="https://image2url.com/r2/default/images/1775305525281-c8ce95d5-a495-449b-bb12-6cae3690be54.jpg" alt="OGYT profile" width="150" height="150" loading="lazy" decoding="async">
    <h1>OGYT</h1>
    <div class="subtitle">OGYT קישורים של</div>
  </div>

  <div class="links">
    <a class="link-btn" href="https://www.youtube.com/@orgala15" target="_blank" rel="noopener noreferrer" aria-label="OGYT יוטיוב" title="OGYT - YouTube"><i class="fab fa-youtube"></i> יוטיוב</a>
    <a class="link-btn" href="https://www.youtube.com/@orgala15?sub_confirmation=1" target="_blank" rel="noopener noreferrer" aria-label="להרשם לערוץ יוטיוב" title="Subscribe on YouTube"><i class="fab fa-youtube"></i> לעשים סאב</a>
    <a class="link-btn" href="https://streamelements.com/orgala14/tip" target="_blank" rel="noopener noreferrer" aria-label="לתרום" title="Donate (age 18+ or parent permission)"><i class="fas fa-coins"></i> תרומות (באישור הורים או 18+)</a>
    <a class="link-btn" href="https://discord.gg/FhgfDndG" target="_blank" rel="noopener noreferrer" aria-label="הצטרף לדיסקורד" title="Discord"><i class="fab fa-discord"></i> דיסקורד</a>
    <a class="link-btn" href="https://www.tiktok.com/@orgala1781" target="_blank" rel="noopener noreferrer" aria-label="OGYT טיקטוק" title="TikTok"><i class="fab fa-tiktok"></i> טיקטוק</a>
  </div>

  <div class="credit">created by ZaDAV1D</div>
</div>

<script>
// אור אחרי העכבר
const cursor=document.getElementById("cursorLight");
document.addEventListener("mousemove", e=>{
  cursor.style.left=e.clientX+'px';
  cursor.style.top=e.clientY+'px';
  cursor.style.transform='translate(-50%,-50%) scale(1.2)';
  setTimeout(()=>cursor.style.transform='translate(-50%,-50%) scale(1)',100);
});

// פטיש
const hammer=document.getElementById('hammer');
const container=document.getElementById('containerFrame');
const buttons=document.querySelectorAll('.link-btn');

function createSpark(x,y,amount=1){
  for(let i=0;i<amount;i++){
    const spark=document.createElement('div');
    spark.className='spark';
    spark.style.left=x+'px';
    spark.style.top=y+'px';
    spark.style.setProperty('--x',(Math.random()-0.5)*150+'px');
    spark.style.setProperty('--y',(Math.random()-0.5)*150+'px');
    document.body.appendChild(spark);
    setTimeout(()=>spark.remove(),800);
  }
}

async function hammerBuild(){
  hammer.style.opacity=1;
  const rect=container.getBoundingClientRect();
  hammer.style.left=rect.left+rect.width/2+'px';
  hammer.style.top=rect.top-50+'px';

  for(let i=0;i<3;i++){
    hammer.style.transform='translate(-50%,-50%) rotate(-20deg) scale(1.1)';
    await new Promise(r=>setTimeout(r,300));
    hammer.style.transform='translate(-50%,-50%) rotate(10deg) scale(1)';
    await new Promise(r=>setTimeout(r,300));
  }

  container.style.opacity=1;
  container.style.transform='scale(1)';
  await new Promise(r=>setTimeout(r,300));

  for(let btn of buttons){
    const br=btn.getBoundingClientRect();
    hammer.style.left=br.left+br.width/2+'px';
    hammer.style.top=br.top-40+'px';
    hammer.style.transform='translate(-50%,-50%) rotate(-20deg) scale(1.1)';
    await new Promise(r=>setTimeout(r,260));
    hammer.style.transform='translate(-50%,-50%) rotate(10deg) scale(1)';
    await new Promise(r=>setTimeout(r,260));

    // reveal via class so CSS :hover 3D transforms still work
    btn.classList.add('revealed');
    createSpark(br.left+br.width/2, br.top+br.height/2,15);
  }

  hammer.style.opacity=0;
}

window.addEventListener('load', hammerBuild);

// canvas רשת חלקיקים
const canvas=document.getElementById('network-bg');
const ctx=canvas.getContext('2d');
let particles=[];
function debounce(fn, wait){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), wait); }; }

function resizeCanvas(){
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  const W = window.innerWidth;
  const H = window.innerHeight;
  canvas.width = Math.floor(W * dpr);
  canvas.height = Math.floor(H * dpr);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);

  // scale particle count to viewport area for performance
  const area = W * H;
  const count = Math.max(30, Math.min(140, Math.floor(area / 12000)));
  particles = [];
  for(let i=0;i<count;i++){
    particles.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.6,vy:(Math.random()-0.5)*0.6});
  }
}

function drawNetwork(){
  const W = window.innerWidth;
  const H = window.innerHeight;
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<particles.length;i++){
    let p=particles[i];
    ctx.fillStyle='rgba(0,255,200,0.7)';
    ctx.beginPath(); ctx.arc(p.x,p.y,2,0,Math.PI*2); ctx.fill();
    for(let j=i+1;j<particles.length;j++){
      let q=particles[j];
      let dx=p.x-q.x, dy=p.y-q.y;
      let dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<120){ ctx.strokeStyle='rgba(0,255,200,'+(0.4-dist/300)+')'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y); ctx.stroke();}
    }
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0||p.x>W)p.vx*=-1;
    if(p.y<0||p.y>H)p.vy*=-1;
  }
  requestAnimationFrame(drawNetwork);
}

resizeCanvas();
drawNetwork();
window.addEventListener('resize',debounce(()=>{resizeCanvas();},120));

// Add interactive tilt to buttons (unless user prefers reduced motion)
const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if(!prefersReduced){
  buttons.forEach((btn, idx)=>{
    // allow CSS to stagger revealed animation
    btn.style.setProperty('--i', idx);

    btn.addEventListener('pointermove', (ev)=>{
      const r = btn.getBoundingClientRect();
      const px = (ev.clientX - r.left) / r.width; // 0..1
      const py = (ev.clientY - r.top) / r.height; // 0..1
      const rx = (0.5 - py) * 12; // rotateX degrees
      const ry = (px - 0.5) * 18; // rotateY degrees
      btn.style.setProperty('--rx', rx + 'deg');
      btn.style.setProperty('--ry', ry + 'deg');
      btn.style.setProperty('--scale', '1.03');
    }, {passive:true});
    btn.addEventListener('pointerleave', ()=>{
      btn.style.setProperty('--rx', '0deg');
      btn.style.setProperty('--ry', '0deg');
      btn.style.setProperty('--scale', '1');
    });
  });
}

// Update hammerBuild to set per-button index and limit spark intensity on small screens
const _oldHammerBuild = hammerBuild;
hammerBuild = async function(){
  const small = window.innerWidth < 520 || prefersReduced;
  hammer.style.opacity=1;
  const rect=container.getBoundingClientRect();
  hammer.style.left=rect.left+rect.width/2+'px';
  hammer.style.top=rect.top-50+'px';

  for(let i=0;i<3;i++){
    hammer.style.transform='translate(-50%,-50%) rotate(-20deg) scale(1.1)';
    await new Promise(r=>setTimeout(r,180));
    hammer.style.transform='translate(-50%,-50%) rotate(10deg) scale(1)';
    await new Promise(r=>setTimeout(r,180));
  }

  container.style.opacity=1;
  container.style.transform='scale(1)';

  for(let i=0;i<buttons.length;i++){
    const btn = buttons[i];
    const br=btn.getBoundingClientRect();
    hammer.style.left=br.left+br.width/2+'px';
    hammer.style.top=br.top-40+'px';
    hammer.style.transform='translate(-50%,-50%) rotate(-20deg) scale(1.1)';
    await new Promise(r=>setTimeout(r,150));
    hammer.style.transform='translate(-50%,-50%) rotate(10deg) scale(1)';
    await new Promise(r=>setTimeout(r,150));

    // reveal via class so CSS :hover 3D transforms still work
    btn.style.setProperty('--i', i);
    btn.classList.add('revealed');
    // fewer sparks on small screens
    createSpark(br.left+br.width/2, br.top+br.height/2, small ? 6 : 15);
  }

  hammer.style.opacity=0;
};

// מניעת F12 / Ctrl+Shift+I / Tab / העתקה
document.addEventListener('keydown', function(e) {
    if(e.key === "F12") e.preventDefault();
    if(e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J")) e.preventDefault();
    if(e.ctrlKey && e.key === "U") e.preventDefault();
    if(e.ctrlKey && (e.key === "c" || e.key === "x" || e.key === "v")) e.preventDefault();
    if(e.key === "Tab") e.preventDefault();
});
document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
document.addEventListener('dragstart', function(e){ e.preventDefault(); });
document.addEventListener('selectstart', function(e){ e.preventDefault(); });
</script>
</body>
</html>
